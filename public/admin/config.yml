backend:
  name: github
  repo: slyuber/PALcares2025Redesign
  branch: main
  auth_type: pkce
  app_id: Ov23li8pFyiSysUv9dxw
  base_url: https://github.com
  auth_endpoint: /login/oauth/authorize

media_folder: public/image
public_folder: /image

collections:
  # ---- Global Settings ----
  - name: global
    label: "Global Settings"
    files:
      - name: global
        label: "Global"
        file: content/global.json
        fields:
          - { name: supportEmail, label: "Support Email", widget: string }

  # ---- SEO & Meta ----
  - name: meta
    label: "SEO & Meta"
    files:
      - name: meta
        label: "Meta Tags"
        file: content/meta.json
        fields:
          - { name: title, label: "Page Title", widget: string }
          - { name: description, label: "Meta Description", widget: text }
          - { name: metadataBase, label: "Base URL", widget: string }
          - name: openGraph
            label: "Open Graph"
            widget: object
            fields:
              - { name: title, label: "OG Title", widget: string }
              - { name: description, label: "OG Description", widget: text }
              - { name: url, label: "OG URL", widget: string }
              - { name: siteName, label: "Site Name", widget: string }
              - { name: locale, label: "Locale", widget: string }
              - { name: type, label: "Type", widget: string }
              - name: images
                label: "OG Images"
                widget: list
                fields:
                  - { name: url, label: "Image URL", widget: string }
                  - { name: width, label: "Width", widget: number }
                  - { name: height, label: "Height", widget: number }
                  - { name: alt, label: "Alt Text", widget: string }
          - name: twitter
            label: "Twitter Card"
            widget: object
            fields:
              - { name: card, label: "Card Type", widget: string }
              - { name: title, label: "Title", widget: string }
              - { name: description, label: "Description", widget: text }
              - { name: images, label: "Images", widget: list, field: { name: url, widget: string } }
          - name: robots
            label: "Robots"
            widget: object
            fields:
              - { name: index, label: "Index", widget: boolean }
              - { name: follow, label: "Follow", widget: boolean }

  # ---- Hero Section ----
  - name: hero
    label: "Hero Section"
    files:
      - name: hero
        label: "Hero"
        file: content/hero.json
        fields:
          - name: tagline
            label: "Tagline"
            widget: object
            fields:
              - { name: line1, label: "Line 1", widget: string }
              - { name: emphasisPrefix, label: "Emphasis Prefix", widget: string, hint: "Text before the animated word" }
              - { name: emphasisWord, label: "Animated Word", widget: string, hint: "This word changes color on scroll" }
              - { name: line2, label: "Line 2", widget: string }
          - { name: description, label: "Description", widget: string, hint: "Use **bold** for emphasis, -- for em-dash" }
          - { name: location, label: "Location", widget: string, hint: "Use __text__ for medium emphasis" }
          - { name: buttonPrimary, label: "Primary Button", widget: string }
          - { name: buttonSecondary, label: "Secondary Button", widget: string }
          - { name: scrollLabel, label: "Scroll Label", widget: string }

  # ---- Where We Started ----
  - name: needWeNoticed
    label: "Where We Started"
    files:
      - name: needWeNoticed
        label: "Where We Started"
        file: content/need-we-noticed.json
        fields:
          - { name: label, label: "Section Label", widget: string }
          - { name: headline, label: "Headline", widget: string }
          - name: leftColumn
            label: "Left Column Paragraphs"
            widget: list
            field: { name: paragraph, widget: text }
          - name: rightColumn
            label: "Right Column Paragraphs"
            widget: list
            field: { name: paragraph, widget: text }

  # ---- How We Work (Storytelling) ----
  - name: storytelling
    label: "How We Work"
    files:
      - name: storytelling
        label: "Storytelling"
        file: content/storytelling.json
        fields:
          - name: intro
            label: "Intro Panel"
            widget: object
            fields:
              - { name: headingPrefix, label: "Heading Prefix", widget: string }
              - { name: headingAnimatedWord, label: "Animated Word", widget: string }
              - { name: headingSuffix, label: "Heading Suffix", widget: string }
              - { name: subtitle, label: "Subtitle", widget: string, hint: "Use **bold** for emphasis" }
              - { name: scrollLabel, label: "Scroll Label", widget: string }
          - name: panels
            label: "Content Panels"
            widget: list
            fields:
              - { name: id, label: "ID", widget: string }
              - { name: icon, label: "Icon Name", widget: string, hint: "Lucide icon: Users, BookOpen, Sprout, FlaskConical" }
              - { name: label, label: "Section Label", widget: string }
              - { name: title, label: "Title", widget: string }
              - { name: description, label: "Description", widget: text, hint: "Use **bold**, {{brand}}, -- for em-dash" }
              - { name: secondaryDescription, label: "Secondary Description", widget: text }
              - { name: details, label: "Details", widget: text }
              - name: items
                label: "Bullet Points"
                widget: list
                field: { name: item, widget: string }
              - { name: quote, label: "Quote", widget: text }
          - name: ecosystem
            label: "Ecosystem Panel"
            widget: object
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: description, label: "Description", widget: text }
              - name: nodes
                label: "Triangle Nodes"
                widget: list
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: sublabel, label: "Sublabel", widget: string }
                  - { name: icon, label: "Icon", widget: string }
                  - { name: color, label: "Color", widget: string }
          - name: progressLabels
            label: "Progress Rail Labels"
            widget: list
            field: { name: label, widget: string }

  # ---- Our Approach ----
  - name: deeperContext
    label: "Our Approach"
    files:
      - name: deeperContext
        label: "Our Approach"
        file: content/deeper-context.json
        fields:
          - { name: heading, label: "Heading", widget: string }
          - { name: subheading, label: "Subheading", widget: string }
          - name: beats
            label: "Beats"
            widget: list
            fields:
              - { name: label, label: "Beat Label", widget: string }
              - name: paragraphs
                label: "Paragraphs"
                widget: list
                field: { name: paragraph, widget: text }

  # ---- Values ----
  - name: values
    label: "Values"
    files:
      - name: values
        label: "Values"
        file: content/values.json
        fields:
          - { name: label, label: "Section Label", widget: string }
          - { name: heading, label: "Heading", widget: string }
          - name: cards
            label: "Value Cards"
            widget: list
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: icon, label: "Icon Name", widget: string, hint: "Lucide icon name" }
              - { name: color, label: "Theme Color", widget: string, hint: "Hex color e.g. #E07B4C" }
              - { name: description, label: "Description", widget: text, hint: "Use **bold** and {_context_} markup" }

  # ---- Testimonials ----
  - name: testimonials
    label: "Testimonials"
    files:
      - name: testimonials
        label: "Testimonials"
        file: content/testimonials.json
        fields:
          - { name: label, label: "Section Label", widget: string }
          - { name: title, label: "Section Title", widget: string }
          - { name: expandLabel, label: "Expand Button Text", widget: string }
          - { name: collapseLabel, label: "Collapse Button Text", widget: string }
          - name: testimonials
            label: "Testimonial Items"
            widget: list
            fields:
              - { name: pullQuote, label: "Pull Quote", widget: text }
              - name: fullTestimonial
                label: "Full Testimonial Paragraphs"
                widget: list
                field: { name: paragraph, widget: text }
              - { name: author, label: "Author", widget: string }
              - { name: role, label: "Role", widget: string }
              - { name: org, label: "Organization", widget: string }

  # ---- Contact ----
  - name: contact
    label: "Contact"
    files:
      - name: contact
        label: "Contact Section"
        file: content/contact.json
        fields:
          - { name: sectionLabel, label: "Section Label", widget: string }
          - { name: heading, label: "Heading", widget: string }
          - { name: description, label: "Description", widget: text }
          - { name: location, label: "Location", widget: string }
          - name: form
            label: "Form"
            widget: object
            fields:
              - name: fields
                label: "Form Fields"
                widget: object
                fields:
                  - name: firstName
                    label: "First Name"
                    widget: object
                    fields:
                      - { name: label, widget: string }
                  - name: lastName
                    label: "Last Name"
                    widget: object
                    fields:
                      - { name: label, widget: string }
                  - name: email
                    label: "Email"
                    widget: object
                    fields:
                      - { name: label, widget: string }
                  - name: org
                    label: "Organization"
                    widget: object
                    fields:
                      - { name: label, widget: string }
                      - { name: optionalNote, widget: string }
                  - name: message
                    label: "Message"
                    widget: object
                    fields:
                      - { name: label, widget: string }
                      - { name: placeholder, widget: string }
              - { name: submitLabel, label: "Submit Button", widget: string }
              - { name: submittingLabel, label: "Submitting Text", widget: string }
              - name: validation
                label: "Validation Messages"
                widget: object
                fields:
                  - { name: firstNameRequired, widget: string }
                  - { name: lastNameRequired, widget: string }
                  - { name: emailRequired, widget: string }
                  - { name: messageMinLength, widget: string }
                  - { name: submitError, widget: string }
                  - { name: networkError, widget: string }
          - name: success
            label: "Success State"
            widget: object
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: body, label: "Body", widget: string }
              - { name: resetLabel, label: "Reset Link Text", widget: string }

  # ---- Footer ----
  - name: footer
    label: "Footer"
    files:
      - name: footer
        label: "Footer"
        file: content/footer.json
        fields:
          - name: brand
            label: "Brand Column"
            widget: object
            fields:
              - { name: logoAlt, label: "Logo Alt Text", widget: string }
              - { name: tagline, label: "Tagline", widget: string }
              - { name: serviceArea, label: "Service Area", widget: string }
              - { name: offerings, label: "Offerings", widget: string }
              - { name: motto, label: "Motto", widget: string }
          - name: quickLinks
            label: "Quick Links"
            widget: object
            fields:
              - { name: heading, label: "Heading", widget: string }
              - name: links
                label: "Links"
                widget: list
                fields:
                  - { name: name, label: "Name", widget: string }
                  - { name: href, label: "URL", widget: string }
          - name: newsletter
            label: "Newsletter"
            widget: object
            fields:
              - { name: heading, label: "Heading", widget: string }
              - { name: placeholder, label: "Placeholder", widget: string }
              - { name: submitLabel, label: "Submit Label", widget: string }
              - { name: successMessage, label: "Success Message", widget: string }
          - name: bottomBar
            label: "Bottom Bar"
            widget: object
            fields:
              - { name: copyright, label: "Copyright Entity", widget: string }
              - name: links
                label: "Legal Links"
                widget: list
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: href, label: "URL", widget: string }

  # ---- Navigation ----
  - name: navigation
    label: "Navigation"
    files:
      - name: navigation
        label: "Navigation"
        file: content/navigation.json
        fields:
          - name: navItems
            label: "Nav Items"
            widget: list
            fields:
              - { name: id, label: "Section ID", widget: string }
              - { name: label, label: "Label", widget: string }
              - { name: hasSubmenu, label: "Has Submenu", widget: boolean, required: false }
              - name: submenu
                label: "Submenu Items"
                widget: list
                required: false
                fields:
                  - { name: id, label: "Section ID", widget: string }
                  - { name: label, label: "Label", widget: string }
                  - { name: scrollOffset, label: "Scroll Offset", widget: number, value_type: float }
          - name: drawerItems
            label: "Drawer Items"
            widget: list
            fields:
              - { name: id, label: "Section ID", widget: string }
              - { name: label, label: "Label", widget: string }
              - { name: hasSubmenu, label: "Has Submenu", widget: boolean, required: false }
              - name: submenu
                label: "Submenu Items"
                widget: list
                required: false
                fields:
                  - { name: id, label: "Section ID", widget: string }
                  - { name: label, label: "Label", widget: string }
                  - { name: scrollOffset, label: "Scroll Offset", widget: number, value_type: float }
          - { name: cta, label: "CTA Button Text", widget: string }
          - { name: hamburgerAriaLabel, label: "Hamburger ARIA Label", widget: string }
          - { name: closeAriaLabel, label: "Close ARIA Label", widget: string }
          - { name: menuAriaLabel, label: "Menu ARIA Label", widget: string }

  # ---- Loader ----
  - name: loader
    label: "Loader"
    files:
      - name: loader
        label: "Loader Animation"
        file: content/loader.json
        fields:
          - name: words
            label: "Animation Words"
            widget: list
            field: { name: word, widget: string }
